name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://gulf-gate-platform.vercel.app
          NEXT_PUBLIC_LIVE_TRADING: "false"
          LIVE_TRADING: "false"
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Production smoke (Playwright)
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://gulf-gate-platform.vercel.app
      - name: Dependency audit (report only)
        run: npm audit --omit=dev --audit-level=critical || true
